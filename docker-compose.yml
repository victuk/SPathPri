services:
  app1:
    build: .
    image: solvpath-pri:latest
    ports:
      - "3910:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "bridge"
      

  app2:
    build: .
    image: solvpath-pri:latest
    ports:
      - "3920:3000"
