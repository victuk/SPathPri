steps:
  deploy-api:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/www/solvpath_pri_sch:/host_env
    commands:
      # Change directory straight to the mounted host directory
      - cd /host_env
      # Force a clean rebuild on the host system
      - docker compose down
      - docker compose up -d --build

when:
  - branch: main
    event: push