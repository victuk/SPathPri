services:
  - name: redis-service
    image: redis:7-alpine

steps:
  # Step 1: Run your test suite in the isolated CI environment
  test-app:
    image: node:20-alpine
    environment:
      REDIS_HOST: redis-service
      REDIS_PORT: "6379"
    commands:
      - npm install
      - npm test

  # Step 2: Only runs if test-app passes perfectly
  deploy-api:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/www/solvpath_pri_sch:/host_env
    commands:
      # Change directory straight to the mounted host directory
      - cd /host_env
      # Force a clean rebuild on the host system
      - docker compose down
      - docker compose up -d --build

when:
  - branch: main
    event: push